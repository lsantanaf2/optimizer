<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ client_name }} — Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #252836;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --accent:  #6366f1;
      --green:   #22c55e;
      --red:     #f87171;
    }

    body { background: var(--bg); color: var(--text);
           font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           font-size: 14px; min-height: 100vh; }

    /* ── Top bar ── */
    .topbar { display: flex; align-items: center; justify-content: space-between;
              padding: 14px 24px; background: var(--surface);
              border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .topbar-name { font-size: 1.1rem; font-weight: 700; color: #f1f5f9; }
    .topbar-badge { font-size: .75rem; color: var(--muted); margin-left: 8px; }

    /* ── Date filter bar ── */
    .filter-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
                  padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--surface); }
    .preset-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
                  background: transparent; color: var(--text); cursor: pointer; font-size: .82rem;
                  transition: background .15s; }
    .preset-btn:hover, .preset-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .date-range { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .date-range input { background: var(--bg); border: 1px solid var(--border); color: var(--text);
                        border-radius: 6px; padding: 4px 8px; font-size: .82rem; }
    .apply-btn { padding: 5px 14px; border-radius: 6px; background: var(--accent); border: none;
                 color: #fff; cursor: pointer; font-size: .82rem; font-weight: 600; }
    .apply-btn:hover { background: #818cf8; }

    /* ── Main layout ── */
    .main { padding: 20px 24px; max-width: 1280px; margin: 0 auto; }

    /* ── Status bar ── */
    .status-bar { display: flex; align-items: center; gap: 8px; padding: 10px 14px;
                  border-radius: 8px; background: var(--surface); border: 1px solid var(--border);
                  margin-bottom: 18px; font-size: .85rem; color: var(--muted); }
    .spinner { width: 14px; height: 14px; border: 2px solid var(--border);
               border-top-color: var(--accent); border-radius: 50%;
               animation: spin .7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-bar.done { color: var(--green); border-color: #14532d; background: #052e16; }
    .status-bar.error { color: var(--red); border-color: #3f1f1f; background: #1a0505; }
    .status-bar.done .spinner, .status-bar.error .spinner { display: none; }

    /* ── KPI cards ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
                gap: 12px; margin-bottom: 20px; }
    .kpi-card { background: var(--surface); border: 1px solid var(--border);
                border-radius: 10px; padding: 16px 18px; }
    .kpi-label { font-size: .75rem; color: var(--muted); text-transform: uppercase;
                 letter-spacing: .05em; margin-bottom: 6px; }
    .kpi-value { font-size: 1.55rem; font-weight: 700; color: #f1f5f9; }
    .kpi-sub   { font-size: .78rem; color: var(--muted); margin-top: 4px; }

    /* ── Chart card ── */
    .chart-card { background: var(--surface); border: 1px solid var(--border);
                  border-radius: 10px; padding: 18px 20px; margin-bottom: 20px; }
    .card-title { font-size: .9rem; font-weight: 600; color: #cbd5e1; margin-bottom: 16px; }

    /* ── Table ── */
    .table-card { background: var(--surface); border: 1px solid var(--border);
                  border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
    .table-card table { width: 100%; border-collapse: collapse; }
    .table-card th { background: #131621; padding: 10px 14px; text-align: right;
                     font-size: .75rem; text-transform: uppercase; letter-spacing: .05em;
                     color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 600; }
    .table-card th:first-child { text-align: left; }
    .table-card td { padding: 9px 14px; text-align: right; border-bottom: 1px solid var(--border);
                     font-size: .85rem; color: var(--text); }
    .table-card td:first-child { text-align: left; color: var(--muted); }
    .table-card tbody tr:last-child td { border-bottom: none; }
    .table-card tfoot td { font-weight: 700; background: #131621;
                           border-top: 1px solid var(--border); font-size: .88rem; }
    .table-card tfoot td:first-child { color: var(--muted); text-transform: uppercase;
                                       font-size: .75rem; letter-spacing: .05em; }

    .empty { padding: 32px; text-align: center; color: var(--muted); font-size: .9rem; }
    .error-msg { color: var(--red); padding: 16px; text-align: center; }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div>
    <span class="topbar-name">{{ client_name }}</span>
    <span class="topbar-badge">Dashboard</span>
  </div>
</div>

<!-- Date filter bar -->
<div class="filter-bar">
  <button class="preset-btn" data-preset="last_7_days">7 dias</button>
  <button class="preset-btn" data-preset="last_14_days">14 dias</button>
  <button class="preset-btn active" data-preset="last_30_days">30 dias</button>
  <button class="preset-btn" data-preset="this_month">Este mês</button>
  <button class="preset-btn" data-preset="last_month">Mês anterior</button>

  <div class="date-range">
    <input type="date" id="since-input" title="De">
    <span style="color:var(--muted)">→</span>
    <input type="date" id="until-input" title="Até">
    <button class="apply-btn" id="apply-range">Aplicar</button>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Status -->
  <div class="status-bar" id="status-bar">
    <div class="spinner"></div>
    <span id="status-msg">Carregando...</span>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid" id="kpi-grid" style="display:none">
    <div class="kpi-card">
      <div class="kpi-label">💸 Gasto</div>
      <div class="kpi-value" id="kpi-spend">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">🏆 Vendas</div>
      <div class="kpi-value" id="kpi-conv">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">💰 Faturamento</div>
      <div class="kpi-value" id="kpi-revenue">—</div>
      <div class="kpi-sub" id="kpi-ticket">ticket R$ —</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">📈 ROAS</div>
      <div class="kpi-value" id="kpi-roas">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">🖱️ Cliques</div>
      <div class="kpi-value" id="kpi-clicks">—</div>
      <div class="kpi-sub" id="kpi-ctr">CTR —</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">📄 Visitas LP</div>
      <div class="kpi-value" id="kpi-lpv">—</div>
      <div class="kpi-sub" id="kpi-cr">Connect Rate —</div>
    </div>
  </div>

  <!-- Chart -->
  <div class="chart-card" id="chart-card" style="display:none">
    <div class="card-title">Gasto × Vendas por dia</div>
    <canvas id="main-chart" height="80"></canvas>
  </div>

  <!-- Table -->
  <div class="table-card" id="table-card" style="display:none">
    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>Gasto</th>
          <th>Cliques</th>
          <th>CTR</th>
          <th>Vis. LP</th>
          <th>Connect Rate</th>
          <th>Vendas</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
      <tfoot id="table-foot"></tfoot>
    </table>
    <div class="empty" id="table-empty" style="display:none">Sem dados para o período.</div>
  </div>

  <div class="error-msg" id="error-msg" style="display:none"></div>
</div>

<script>
// ── Config injetada pelo servidor ──────────────────────────────────────────
const API_BASE   = '{{ api_base }}';
const DASH_TOKEN = '{{ dash_token }}';
const TICKET     = {{ ticket_value | default(0) }};
const LOCKED_PERIOD = '{{ locked_period }}';

// ── Estado ─────────────────────────────────────────────────────────────────
let appliedPreset = LOCKED_PERIOD || 'last_30_days';
let appliedSince  = null;
let appliedUntil  = null;
let abortCtrl     = null;
let chart         = null;

// ── Helpers ────────────────────────────────────────────────────────────────
const fmtBRL = v => v == null ? '—' :
    'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
const fmtN  = v => v == null ? '—' : Number(v).toLocaleString('pt-BR');
const fmtPct = v => v == null ? '—' : Number(v).toFixed(1) + '%';
const fmtX  = v => v == null ? '—' : Number(v).toFixed(2) + 'x';

function apiUrl(path, qs) {
    const parts = [DASH_TOKEN ? 't=' + DASH_TOKEN : '', qs ? String(qs) : '']
                    .filter(Boolean).join('&');
    return API_BASE + path + (parts ? '?' + parts : '');
}

function getDateQS() {
    const p = new URLSearchParams();
    if (appliedSince && appliedUntil) {
        p.set('since', appliedSince);
        p.set('until', appliedUntil);
    } else {
        p.set('date_preset', appliedPreset);
    }
    return p.toString();
}

// ── Date presets ───────────────────────────────────────────────────────────
const presetBtns = document.querySelectorAll('.preset-btn');
presetBtns.forEach(btn => {
    if (LOCKED_PERIOD) btn.disabled = true;
    btn.addEventListener('click', () => {
        if (LOCKED_PERIOD) return;
        presetBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        appliedPreset = btn.dataset.preset;
        appliedSince  = null;
        appliedUntil  = null;
        document.getElementById('since-input').value = '';
        document.getElementById('until-input').value = '';
        load();
    });
});

if (LOCKED_PERIOD) {
    // Highlight locked preset button
    presetBtns.forEach(b => {
        b.classList.toggle('active', b.dataset.preset === LOCKED_PERIOD);
    });
    document.getElementById('apply-range').disabled = true;
    document.getElementById('since-input').disabled = true;
    document.getElementById('until-input').disabled = true;
}

document.getElementById('apply-range').addEventListener('click', () => {
    if (LOCKED_PERIOD) return;
    const s = document.getElementById('since-input').value;
    const u = document.getElementById('until-input').value;
    if (!s || !u) return;
    appliedPreset = '';
    appliedSince  = s;
    appliedUntil  = u;
    presetBtns.forEach(b => b.classList.remove('active'));
    load();
});

// ── Render KPIs ────────────────────────────────────────────────────────────
function renderKpis(t) {
    document.getElementById('kpi-spend').textContent   = fmtBRL(t.spend);
    document.getElementById('kpi-conv').textContent    = fmtN(t.conversions);
    document.getElementById('kpi-revenue').textContent = fmtBRL(t.revenue);
    document.getElementById('kpi-ticket').textContent  = 'ticket ' + fmtBRL(t.ticket);
    document.getElementById('kpi-roas').textContent    = fmtX(t.roas);
    document.getElementById('kpi-clicks').textContent  = fmtN(t.clicks);
    document.getElementById('kpi-ctr').textContent     = 'CTR ' + fmtPct(t.ctr);
    document.getElementById('kpi-lpv').textContent     = fmtN(t.lpv);
    document.getElementById('kpi-cr').textContent      = 'Connect Rate ' + fmtPct(t.connect_rate);
}

// ── Render Table ───────────────────────────────────────────────────────────
function renderTable(rows) {
    const tbody = document.getElementById('table-body');
    const tfoot = document.getElementById('table-foot');
    const empty = document.getElementById('table-empty');

    if (!rows.length) {
        tbody.innerHTML = '';
        tfoot.innerHTML = '';
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';

    // Sorted descending by date
    const sorted = [...rows].sort((a, b) => b.date.localeCompare(a.date));

    tbody.innerHTML = sorted.map(r => `
        <tr>
          <td>${r.date}</td>
          <td>${fmtBRL(r.spend)}</td>
          <td>${fmtN(r.clicks)}</td>
          <td>${fmtPct(r.ctr)}</td>
          <td>${fmtN(r.lpv)}</td>
          <td>${fmtPct(r.connect_rate)}</td>
          <td>${fmtN(r.conversions)}</td>
        </tr>`).join('');

    // Totals row
    const tot = rows.reduce((acc, r) => {
        acc.spend += r.spend; acc.clicks += r.clicks;
        acc.lpv   += r.lpv;   acc.conv   += r.conversions;
        acc.impr  += r.impressions;
        return acc;
    }, {spend: 0, clicks: 0, lpv: 0, conv: 0, impr: 0});

    const totCtr = tot.impr > 0 ? (tot.clicks / tot.impr * 100).toFixed(1) : '—';
    const totCr  = tot.clicks > 0 ? (tot.lpv / tot.clicks * 100).toFixed(1) : '—';

    tfoot.innerHTML = `
        <tr>
          <td>Total</td>
          <td>${fmtBRL(tot.spend)}</td>
          <td>${fmtN(tot.clicks)}</td>
          <td>${totCtr !== '—' ? totCtr + '%' : '—'}</td>
          <td>${fmtN(tot.lpv)}</td>
          <td>${totCr !== '—' ? totCr + '%' : '—'}</td>
          <td>${fmtN(tot.conv)}</td>
        </tr>`;
}

// ── Render Chart ───────────────────────────────────────────────────────────
function renderChart(rows) {
    const sorted = [...rows].sort((a, b) => a.date.localeCompare(b.date));
    const labels  = sorted.map(r => r.date.slice(5));  // MM-DD
    const spends  = sorted.map(r => r.spend);
    const convs   = sorted.map(r => r.conversions);

    const ctx = document.getElementById('main-chart').getContext('2d');
    if (chart) { chart.destroy(); chart = null; }

    chart = new Chart(ctx, {
        data: {
            labels,
            datasets: [
                {
                    type:        'bar',
                    label:       'Gasto (R$)',
                    data:        spends,
                    backgroundColor: 'rgba(99,102,241,.5)',
                    borderColor:     '#6366f1',
                    borderWidth:     1,
                    yAxisID:     'y',
                },
                {
                    type:        'line',
                    label:       'Vendas',
                    data:        convs,
                    borderColor: '#22c55e',
                    backgroundColor: 'rgba(34,197,94,.15)',
                    borderWidth: 2,
                    pointRadius: 3,
                    tension:     .3,
                    yAxisID:     'y2',
                    fill:        true,
                },
            ]
        },
        options: {
            responsive: true,
            interaction: { mode: 'index', intersect: false },
            plugins: { legend: { labels: { color: '#94a3b8', font: { size: 12 } } } },
            scales: {
                x:  { ticks: { color: '#64748b', maxTicksLimit: 14 }, grid: { color: '#1e2333' } },
                y:  { position: 'left',  ticks: { color: '#64748b',
                        callback: v => 'R$ ' + v.toLocaleString('pt-BR') }, grid: { color: '#1e2333' } },
                y2: { position: 'right', ticks: { color: '#22c55e' }, grid: { drawOnChartArea: false } },
            }
        }
    });
}

// ── SSE loader ─────────────────────────────────────────────────────────────
function setStatus(msg, cls = '') {
    const bar = document.getElementById('status-bar');
    bar.className = 'status-bar' + (cls ? ' ' + cls : '');
    document.getElementById('status-msg').textContent = msg;
}

function show(id)    { const el = document.getElementById(id); if (el) el.style.display = ''; }
function hide(id)    { const el = document.getElementById(id); if (el) el.style.display = 'none'; }

async function load() {
    // Abort any in-flight request
    if (abortCtrl) { try { abortCtrl.abort(); } catch (_) {} }
    abortCtrl = new AbortController();
    const signal = abortCtrl.signal;

    hide('kpi-grid'); hide('chart-card'); hide('table-card'); hide('error-msg');
    setStatus('Carregando...');

    try {
        const url  = apiUrl('/meta-only', getDateQS());
        const resp = await fetch(url, { signal });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);

        const reader  = resp.body.getReader();
        const decoder = new TextDecoder();
        let   buffer  = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });

            const parts = buffer.split('\n\n');
            buffer = parts.pop();

            for (const part of parts) {
                const line = part.trim();
                if (!line || line.startsWith(':')) continue;
                if (!line.startsWith('data:')) continue;

                let d;
                try { d = JSON.parse(line.slice(5).trim()); } catch (_) { continue; }

                if (d.stage === 'status') {
                    setStatus(d.message);

                } else if (d.stage === 'kpis') {
                    renderKpis(d.totals);
                    show('kpi-grid');

                } else if (d.stage === 'daily') {
                    renderTable(d.rows);
                    renderChart(d.rows);
                    show('table-card');
                    show('chart-card');

                } else if (d.stage === 'done') {
                    setStatus('✓ Atualizado em ' + new Date().toLocaleTimeString('pt-BR'), 'done');

                } else if (d.stage === 'error') {
                    setStatus('Erro: ' + d.message, 'error');
                    document.getElementById('error-msg').textContent = d.message;
                    show('error-msg');
                }
            }
        }
    } catch (err) {
        if (err.name !== 'AbortError') {
            setStatus('Erro de conexão: ' + err.message, 'error');
        }
    }
}

// ── Boot ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
