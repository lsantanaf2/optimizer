<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ client_name }} — Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Paleta principal */
      --bg:             #0f1117;
      --bg-deep:        #0a0c12;
      --surface:        #1a1d27;
      --border:         #252836;
      --text:           #e2e8f0;
      --muted:          #64748b;
      --accent:         #6366f1;
      --green:          #22c55e;
      --red:            #f87171;

      /* Aliases para reutilizar o DRP do cruzamento sem reescrever */
      --bg-surface:     var(--surface);
      --card-bg:        var(--surface);
      --card-bg-hover:  rgba(255,255,255,0.05);
      --text-primary:   var(--text);
      --text-secondary: #cbd5e1;
      --text-muted:     var(--muted);
      --accent-alt:     #818cf8;
      --radius-sm:      6px;
      --radius-md:      8px;
      --font-sans:      inherit;
    }

    body { background: var(--bg); color: var(--text);
           font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           font-size: 14px; min-height: 100vh; }

    /* ── Top bar ── */
    .topbar { display: flex; align-items: center; justify-content: space-between;
              padding: 14px 24px; background: var(--surface);
              border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50;
              gap: 12px; flex-wrap: wrap; }
    .topbar-left { display: flex; align-items: baseline; gap: 8px; }
    .topbar-name { font-size: 1.1rem; font-weight: 700; color: #f1f5f9; }
    .topbar-badge { font-size: .75rem; color: var(--muted); }
    .topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    /* ── Date Range Picker (portado do /cruzamento) ────────────────── */
    .drp-wrap { position: relative; }
    .drp-trigger {
        display: flex; align-items: center; gap: 8px;
        padding: 6px 14px;
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text-primary);
        font-family: var(--font-sans);
        font-size: 12px; font-weight: 500;
        cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .drp-trigger:hover { border-color: var(--accent); }
    .drp-arrow { font-size: 10px; color: var(--text-muted); }
    .drp-dropdown {
        display: none; position: absolute;
        top: calc(100% + 6px); right: 0; z-index: 1000;
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        min-width: 620px;
    }
    .drp-dropdown.open { display: block; }
    .drp-body { display: flex; }
    .drp-presets {
        width: 160px; border-right: 1px solid var(--border);
        padding: 12px 0; display: flex; flex-direction: column; flex-shrink: 0;
    }
    .drp-presets-title {
        padding: 4px 16px 8px; font-size: 10px;
        text-transform: uppercase; letter-spacing: 0.6px;
        color: var(--text-muted); font-weight: 700;
    }
    .drp-preset {
        display: flex; align-items: center; gap: 8px;
        padding: 0 16px; margin: 5px 0; font-size: 12px; color: var(--text-secondary);
        cursor: pointer; transition: all 0.1s; border: none; background: none;
    }
    .drp-preset:hover { background: var(--card-bg-hover); color: var(--text-primary); }
    .drp-preset.active { background: rgba(99,102,241,0.15); color: var(--accent); }
    .drp-preset input[type="radio"] { width: 13px; height: 13px; accent-color: var(--accent); margin: 0; cursor: pointer; }
    .drp-cal-area { display: flex; flex-direction: column; flex: 1; }
    .drp-cals { display: flex; gap: 0; padding: 12px 16px; flex: 1; }
    .drp-cal { flex: 1; }
    .drp-cal-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 4px 10px; font-size: 12px; font-weight: 600; color: var(--text-primary);
    }
    .drp-cal-nav {
        background: none; border: none; color: var(--text-muted);
        font-size: 16px; cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: all 0.15s;
    }
    .drp-cal-nav:hover { background: var(--card-bg-hover); color: var(--text-primary); }
    .drp-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; text-align: center; }
    .drp-cal-dow { font-size: 10px; font-weight: 700; color: var(--text-muted); padding: 4px 0; text-transform: uppercase; letter-spacing: 0.4px; }
    .drp-cal-day { font-size: 12px; padding: 6px 2px; cursor: pointer; border-radius: 4px; color: var(--text-secondary); transition: all 0.1s; }
    .drp-cal-day:hover { background: var(--card-bg-hover); color: var(--text-primary); }
    .drp-cal-day.other-month { color: var(--text-muted); opacity: 0.3; }
    .drp-cal-day.today { font-weight: 700; color: var(--accent); }
    .drp-cal-day.in-range { background: rgba(99,102,241,0.18); border-radius: 0; color: var(--text-primary); }
    .drp-cal-day.range-start { background: var(--accent); color: #fff; border-radius: 6px 0 0 6px; font-weight: 700; }
    .drp-cal-day.range-end { background: var(--accent); color: #fff; border-radius: 0 6px 6px 0; font-weight: 700; }
    .drp-cal-day.range-start.range-end { border-radius: 6px; }
    .drp-cal-day.disabled { opacity: 0.2; pointer-events: none; }
    .drp-inline-footer {
        display: flex; align-items: center; justify-content: space-between;
        gap: 12px; padding: 10px 16px; border-top: 1px solid var(--border);
    }
    .drp-footer-dates { display: flex; align-items: center; gap: 6px; }
    .drp-date-input {
        width: 120px; padding: 5px 8px;
        background: var(--bg-deep); border: 1px solid var(--border);
        border-radius: 4px; color: var(--text-primary);
        font-family: var(--font-sans); font-size: 11px; text-align: center;
    }
    .drp-footer-btns { display: flex; gap: 8px; }
    .drp-btn-cancel {
        padding: 6px 16px; background: var(--bg-deep);
        border: 1px solid var(--border); border-radius: 4px;
        color: var(--text-secondary); font-family: var(--font-sans);
        font-size: 12px; cursor: pointer; transition: all 0.15s;
    }
    .drp-btn-cancel:hover { border-color: var(--text-muted); color: var(--text-primary); }
    .drp-btn-apply {
        padding: 6px 20px; background: var(--accent); border: none; border-radius: 4px;
        color: #fff; font-family: var(--font-sans); font-size: 12px;
        font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .drp-btn-apply:hover { background: var(--accent-alt); }

    .btn-refresh {
        padding: 6px 14px; border: 1px solid var(--border);
        border-radius: var(--radius-sm); background: var(--card-bg);
        color: var(--text-primary); cursor: pointer;
        font-size: 12px; font-weight: 600; transition: all .15s;
    }
    .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Main layout ── */
    .main { padding: 20px 24px; max-width: 1280px; margin: 0 auto; }

    /* ── Status bar ── */
    .status-bar { display: flex; align-items: center; gap: 8px; padding: 10px 14px;
                  border-radius: 8px; background: var(--surface); border: 1px solid var(--border);
                  margin-bottom: 18px; font-size: .85rem; color: var(--muted); }
    .spinner { width: 14px; height: 14px; border: 2px solid var(--border);
               border-top-color: var(--accent); border-radius: 50%;
               animation: spin .7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-bar.done { color: var(--green); border-color: #14532d; background: #052e16; }
    .status-bar.error { color: var(--red); border-color: #3f1f1f; background: #1a0505; }
    .status-bar.done .spinner, .status-bar.error .spinner { display: none; }

    /* ── KPI cards ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
                gap: 12px; margin-bottom: 20px; }
    .kpi-card { background: var(--surface); border: 1px solid var(--border);
                border-radius: 10px; padding: 16px 18px; }
    .kpi-label { font-size: .75rem; color: var(--muted); text-transform: uppercase;
                 letter-spacing: .05em; margin-bottom: 6px; }
    .kpi-value { font-size: 1.55rem; font-weight: 700; color: #f1f5f9; }
    .kpi-sub   { font-size: .78rem; color: var(--muted); margin-top: 4px; }

    /* ── Chart card ── */
    .chart-card { background: var(--surface); border: 1px solid var(--border);
                  border-radius: 10px; padding: 18px 20px; margin-bottom: 20px; }
    .card-title { font-size: .9rem; font-weight: 600; color: #cbd5e1; margin-bottom: 16px; }

    /* ── Table ── */
    .table-card { background: var(--surface); border: 1px solid var(--border);
                  border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
    .table-card table { width: 100%; border-collapse: collapse; }
    .table-card th { background: #131621; padding: 10px 14px; text-align: right;
                     font-size: .75rem; text-transform: uppercase; letter-spacing: .05em;
                     color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 600; }
    .table-card th:first-child { text-align: left; }
    .table-card td { padding: 9px 14px; text-align: right; border-bottom: 1px solid var(--border);
                     font-size: .85rem; color: var(--text); }
    .table-card td:first-child { text-align: left; color: var(--muted); }
    .table-card tbody tr:last-child td { border-bottom: none; }
    .table-card tfoot td { font-weight: 700; background: #131621;
                           border-top: 1px solid var(--border); font-size: .88rem; }
    .table-card tfoot td:first-child { color: var(--muted); text-transform: uppercase;
                                       font-size: .75rem; letter-spacing: .05em; }

    .empty { padding: 32px; text-align: center; color: var(--muted); font-size: .9rem; }
    .error-msg { color: var(--red); padding: 16px; text-align: center; }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-name">{{ client_name }}</span>
    <span class="topbar-badge">Dashboard</span>
  </div>
  <div class="topbar-right">
    <div class="drp-wrap" id="drp-wrap">
      <button class="drp-trigger" id="drp-trigger" onclick="toggleDatePicker()">
        <span>📅</span>
        <span id="drp-label">Últimos 7 dias</span>
        <span class="drp-arrow">▾</span>
      </button>
      <div class="drp-dropdown" id="drp-dropdown">
        <div class="drp-body">
          <div class="drp-presets">
            <div class="drp-presets-title">Período</div>
            <label class="drp-preset" data-preset="today"><input type="radio" name="drp" value="today"> Hoje</label>
            <label class="drp-preset" data-preset="yesterday"><input type="radio" name="drp" value="yesterday"> Ontem</label>
            <label class="drp-preset" data-preset="last_3d"><input type="radio" name="drp" value="last_3d"> Últimos 3 dias</label>
            <label class="drp-preset" data-preset="last_7d"><input type="radio" name="drp" value="last_7d" checked> Últimos 7 dias</label>
            <label class="drp-preset" data-preset="last_14d"><input type="radio" name="drp" value="last_14d"> Últimos 14 dias</label>
            <label class="drp-preset" data-preset="last_30d"><input type="radio" name="drp" value="last_30d"> Últimos 30 dias</label>
            <label class="drp-preset" data-preset="this_month"><input type="radio" name="drp" value="this_month"> Este mês</label>
            <label class="drp-preset" data-preset="last_month"><input type="radio" name="drp" value="last_month"> Mês passado</label>
            <label class="drp-preset" data-preset="last_60d"><input type="radio" name="drp" value="last_60d"> Últimos 60 dias</label>
            <label class="drp-preset" data-preset="maximum"><input type="radio" name="drp" value="maximum"> Tempo todo</label>
            <label class="drp-preset" data-preset="custom"><input type="radio" name="drp" value="custom"> Personalizado</label>
          </div>
          <div class="drp-cal-area">
            <div class="drp-cals">
              <div class="drp-cal" id="drp-cal-left"></div>
              <div class="drp-cal" id="drp-cal-right"></div>
            </div>
            <div class="drp-inline-footer">
              <div class="drp-footer-dates">
                <input type="text" class="drp-date-input" id="drp-since-display" readonly placeholder="Data inicial">
                <span style="color:var(--text-muted);font-size:11px;">→</span>
                <input type="text" class="drp-date-input" id="drp-until-display" readonly placeholder="Data final">
              </div>
              <div class="drp-footer-btns">
                <button class="drp-btn-cancel" onclick="cancelDatePicker()">Cancelar</button>
                <button class="drp-btn-apply" onclick="applyDatePicker()">Atualizar</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <button class="btn-refresh" onclick="load()">🔄 Atualizar</button>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Status -->
  <div class="status-bar" id="status-bar">
    <div class="spinner"></div>
    <span id="status-msg">Carregando...</span>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid" id="kpi-grid" style="display:none">
    <div class="kpi-card">
      <div class="kpi-label">💸 Gasto</div>
      <div class="kpi-value" id="kpi-spend">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">🏆 Vendas</div>
      <div class="kpi-value" id="kpi-conv">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">💰 Faturamento</div>
      <div class="kpi-value" id="kpi-revenue">—</div>
      <div class="kpi-sub" id="kpi-ticket">ticket R$ —</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">📈 ROAS</div>
      <div class="kpi-value" id="kpi-roas">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">🖱️ Cliques</div>
      <div class="kpi-value" id="kpi-clicks">—</div>
      <div class="kpi-sub" id="kpi-ctr">CTR —</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">📄 Visitas LP</div>
      <div class="kpi-value" id="kpi-lpv">—</div>
      <div class="kpi-sub" id="kpi-cr">Connect Rate —</div>
    </div>
  </div>

  <!-- Chart -->
  <div class="chart-card" id="chart-card" style="display:none">
    <div class="card-title">Gasto × Vendas por dia</div>
    <canvas id="main-chart" height="80"></canvas>
  </div>

  <!-- Table -->
  <div class="table-card" id="table-card" style="display:none">
    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>Gasto</th>
          <th>Cliques</th>
          <th>CTR</th>
          <th>Vis. LP</th>
          <th>Connect Rate</th>
          <th>Vendas</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
      <tfoot id="table-foot"></tfoot>
    </table>
    <div class="empty" id="table-empty" style="display:none">Sem dados para o período.</div>
  </div>

  <div class="error-msg" id="error-msg" style="display:none"></div>
</div>

<script>
// ── Config injetada pelo servidor ──────────────────────────────────────────
const API_BASE      = '{{ api_base }}';
const DASH_TOKEN    = '{{ dash_token }}';
const LOCKED_PERIOD = '{{ locked_period }}';
const IS_CLIENT     = true;  // dash_meta sempre é client-view

// ── Estado ─────────────────────────────────────────────────────────────────
let abortCtrl = null;
let chart     = null;

// ── Helpers ────────────────────────────────────────────────────────────────
const fmtBRL = v => v == null ? '—' :
    'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
const fmtN  = v => v == null ? '—' : Number(v).toLocaleString('pt-BR');
const fmtPct = v => v == null ? '—' : Number(v).toFixed(1) + '%';
const fmtX  = v => v == null ? '—' : Number(v).toFixed(2) + 'x';

function apiUrl(path, qs) {
    const parts = [DASH_TOKEN ? 't=' + DASH_TOKEN : '', qs ? String(qs) : '']
                    .filter(Boolean).join('&');
    return API_BASE + path + (parts ? '?' + parts : '');
}

// ── Date Range Picker (copiado do /cruzamento, adaptado p/ dash_meta) ─────
const MONTHS_PT = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const DAYS_PT   = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];

let drpOpen = false;
let drpPreset      = LOCKED_PERIOD || 'last_7d';
let drpTempSince   = null, drpTempUntil = null;
let drpClickState  = 0;
let drpLeftMonth   = null, drpRightMonth = null;
let appliedPreset  = LOCKED_PERIOD || 'last_7d';
let appliedSince   = null, appliedUntil  = null;

function todayDate() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function dateStr(d)  { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function datePT(d)   { return `${d.getDate()} de ${MONTHS_PT[d.getMonth()]} de ${d.getFullYear()}`; }
function sameDay(a, b) { return a && b && dateStr(a) === dateStr(b); }

function presetToDates(preset) {
    const today = todayDate();
    switch (preset) {
        case 'today':      return { since: new Date(today), until: new Date(today) };
        case 'yesterday':  return { since: new Date(today - 86400000), until: new Date(today - 86400000) };
        case 'last_3d':    return { since: new Date(today - 2*86400000),  until: new Date(today) };
        case 'last_7d':    return { since: new Date(today - 6*86400000),  until: new Date(today) };
        case 'last_14d':   return { since: new Date(today - 13*86400000), until: new Date(today) };
        case 'last_30d':   return { since: new Date(today - 29*86400000), until: new Date(today) };
        case 'this_month': return { since: new Date(today.getFullYear(), today.getMonth(), 1), until: new Date(today) };
        case 'last_month': return {
            since: new Date(today.getFullYear(), today.getMonth()-1, 1),
            until: new Date(today.getFullYear(), today.getMonth(), 0)
        };
        case 'last_60d': return { since: new Date(today - 59*86400000), until: new Date(today) };
        default: return { since: new Date(today - 6*86400000), until: new Date(today) };
    }
}

function getDateQS() {
    const p = new URLSearchParams();
    if (appliedPreset === 'maximum') { p.set('date_preset', 'maximum'); return p.toString(); }
    if (appliedSince && appliedUntil) {
        p.set('since', dateStr(appliedSince));
        p.set('until', dateStr(appliedUntil));
    } else {
        p.set('date_preset', appliedPreset || 'last_7d');
    }
    return p.toString();
}

function initDRP() {
    const { since, until } = presetToDates(appliedPreset);
    appliedSince = since; appliedUntil = until;
    drpTempSince = new Date(since); drpTempUntil = new Date(until);
    const today = todayDate();
    drpLeftMonth  = { year: today.getMonth() === 0 ? today.getFullYear()-1 : today.getFullYear(),
                      month: today.getMonth() === 0 ? 11 : today.getMonth()-1 };
    drpRightMonth = { year: today.getFullYear(), month: today.getMonth() };
    updateTriggerLabel();
}

function updateTriggerLabel() {
    const label = document.getElementById('drp-label');
    if (!label) return;
    if (appliedPreset === 'maximum') { label.textContent = 'Tempo todo'; return; }
    const s = appliedSince, u = appliedUntil;
    if (s && u) label.textContent = sameDay(s, u) ? datePT(s) : `${datePT(s)} → ${datePT(u)}`;
}

function toggleDatePicker() {
    drpOpen = !drpOpen;
    document.getElementById('drp-dropdown').classList.toggle('open', drpOpen);
    if (drpOpen) {
        drpPreset = appliedPreset;
        drpTempSince = appliedSince ? new Date(appliedSince) : null;
        drpTempUntil = appliedUntil ? new Date(appliedUntil) : null;
        drpClickState = 0;
        highlightPreset(); renderCalendars(); updateFooterDates();
    }
}

function cancelDatePicker() {
    drpOpen = false;
    document.getElementById('drp-dropdown').classList.remove('open');
}

function applyDatePicker() {
    appliedPreset = drpPreset;
    if (drpPreset === 'custom') {
        if (!drpTempSince || !drpTempUntil) return;
        appliedSince = new Date(drpTempSince); appliedUntil = new Date(drpTempUntil);
    } else if (drpPreset === 'maximum') {
        appliedSince = null; appliedUntil = null;
    } else {
        const { since, until } = presetToDates(drpPreset);
        appliedSince = since; appliedUntil = until;
    }
    drpOpen = false;
    document.getElementById('drp-dropdown').classList.remove('open');
    updateTriggerLabel();
    load();
}

function highlightPreset() {
    document.querySelectorAll('.drp-preset').forEach(el => {
        const val = el.dataset.preset;
        el.classList.toggle('active', val === drpPreset);
        const radio = el.querySelector('input'); if (radio) radio.checked = val === drpPreset;
    });
}

document.addEventListener('click', (e) => {
    const preset = e.target.closest('.drp-preset');
    if (preset) {
        const val = preset.dataset.preset;
        drpPreset = val; highlightPreset();
        if (val !== 'custom' && val !== 'maximum') {
            const { since, until } = presetToDates(val);
            drpTempSince = since; drpTempUntil = until; drpClickState = 0;
            drpLeftMonth  = { year: since.getFullYear(), month: since.getMonth() };
            const nm = since.getMonth() + 1;
            drpRightMonth = { year: nm > 11 ? since.getFullYear()+1 : since.getFullYear(), month: nm > 11 ? 0 : nm };
            if (until.getFullYear() > drpRightMonth.year ||
                (until.getFullYear() === drpRightMonth.year && until.getMonth() > drpRightMonth.month)) {
                drpRightMonth = { year: until.getFullYear(), month: until.getMonth() };
                const pm = until.getMonth() - 1;
                drpLeftMonth = { year: pm < 0 ? until.getFullYear()-1 : until.getFullYear(), month: pm < 0 ? 11 : pm };
            }
        } else if (val === 'maximum') {
            drpTempSince = null; drpTempUntil = null; drpClickState = 0;
        } else { drpClickState = 0; }
        renderCalendars(); updateFooterDates();
    }
    if (drpOpen && !e.target.closest('#drp-wrap')) cancelDatePicker();
});

function updateFooterDates() {
    document.getElementById('drp-since-display').value = drpTempSince ? datePT(drpTempSince) : '';
    document.getElementById('drp-until-display').value = drpTempUntil ? datePT(drpTempUntil) : '';
}

function renderCalendars() {
    renderOneCalendar('drp-cal-left',  drpLeftMonth,  'left');
    renderOneCalendar('drp-cal-right', drpRightMonth, 'right');
}

function renderOneCalendar(containerId, monthObj, side) {
    const container = document.getElementById(containerId);
    if (!container || !monthObj) return;
    const { year, month } = monthObj;
    const today = todayDate();
    let html = `<div class="drp-cal-header">`;
    html += side === 'left'  ? `<button class="drp-cal-nav" onclick="event.stopPropagation();navMonth(-1)">‹</button>` : `<span></span>`;
    html += `<span>${MONTHS_PT[month]} ${year}</span>`;
    html += side === 'right' ? `<button class="drp-cal-nav" onclick="event.stopPropagation();navMonth(1)">›</button>`  : `<span></span>`;
    html += `</div><div class="drp-cal-grid">`;
    DAYS_PT.forEach(d => { html += `<div class="drp-cal-dow">${d}</div>`; });
    let startDow = new Date(year, month, 1).getDay();
    startDow = startDow === 0 ? 6 : startDow - 1;
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const prevDays    = new Date(year, month, 0).getDate();
    for (let i = startDow-1; i >= 0; i--) html += `<div class="drp-cal-day other-month">${prevDays-i}</div>`;
    for (let d = 1; d <= daysInMonth; d++) {
        const td = new Date(year, month, d);
        const cls = ['drp-cal-day'];
        if (sameDay(td, today)) cls.push('today');
        if (td > today) cls.push('disabled');
        if (drpTempSince && drpTempUntil) {
            if (sameDay(td, drpTempSince)) cls.push('range-start');
            if (sameDay(td, drpTempUntil)) cls.push('range-end');
            if (td > drpTempSince && td < drpTempUntil) cls.push('in-range');
        } else if (drpTempSince && sameDay(td, drpTempSince)) cls.push('range-start','range-end');
        html += `<div class="${cls.join(' ')}" onclick="event.stopPropagation();onDayClick('${dateStr(td)}')">${d}</div>`;
    }
    const remaining = (startDow + daysInMonth) % 7 === 0 ? 0 : 7 - ((startDow + daysInMonth) % 7);
    for (let i = 1; i <= remaining; i++) html += `<div class="drp-cal-day other-month">${i}</div>`;
    html += `</div>`;
    container.innerHTML = html;
}

function navMonth(dir) {
    [drpLeftMonth, drpRightMonth].forEach(m => {
        m.month += dir;
        if (m.month < 0)  { m.month = 11; m.year--; }
        if (m.month > 11) { m.month = 0;  m.year++; }
    });
    renderCalendars();
}

function onDayClick(ds) {
    const clicked = new Date(ds + 'T00:00:00');
    drpPreset = 'custom'; highlightPreset();
    if (drpClickState === 0) {
        drpTempSince = clicked; drpTempUntil = null; drpClickState = 1;
    } else {
        if (clicked < drpTempSince) { drpTempUntil = new Date(drpTempSince); drpTempSince = clicked; }
        else drpTempUntil = clicked;
        drpClickState = 0;
    }
    renderCalendars(); updateFooterDates();
}

// ── Render KPIs ────────────────────────────────────────────────────────────
function renderKpis(t) {
    document.getElementById('kpi-spend').textContent   = fmtBRL(t.spend);
    document.getElementById('kpi-conv').textContent    = fmtN(t.conversions);
    document.getElementById('kpi-revenue').textContent = fmtBRL(t.revenue);
    document.getElementById('kpi-ticket').textContent  = 'ticket ' + fmtBRL(t.ticket);
    document.getElementById('kpi-roas').textContent    = fmtX(t.roas);
    document.getElementById('kpi-clicks').textContent  = fmtN(t.clicks);
    document.getElementById('kpi-ctr').textContent     = 'CTR ' + fmtPct(t.ctr);
    document.getElementById('kpi-lpv').textContent     = fmtN(t.lpv);
    document.getElementById('kpi-cr').textContent      = 'Connect Rate ' + fmtPct(t.connect_rate);
}

// ── Render Table ───────────────────────────────────────────────────────────
function renderTable(rows) {
    const tbody = document.getElementById('table-body');
    const tfoot = document.getElementById('table-foot');
    const empty = document.getElementById('table-empty');

    if (!rows.length) {
        tbody.innerHTML = ''; tfoot.innerHTML = '';
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';

    const sorted = [...rows].sort((a, b) => b.date.localeCompare(a.date));

    tbody.innerHTML = sorted.map(r => `
        <tr>
          <td>${r.date}</td>
          <td>${fmtBRL(r.spend)}</td>
          <td>${fmtN(r.clicks)}</td>
          <td>${fmtPct(r.ctr)}</td>
          <td>${fmtN(r.lpv)}</td>
          <td>${fmtPct(r.connect_rate)}</td>
          <td>${fmtN(r.conversions)}</td>
        </tr>`).join('');

    const tot = rows.reduce((acc, r) => {
        acc.spend += r.spend; acc.clicks += r.clicks;
        acc.lpv   += r.lpv;   acc.conv   += r.conversions;
        acc.impr  += r.impressions;
        return acc;
    }, {spend: 0, clicks: 0, lpv: 0, conv: 0, impr: 0});

    const totCtr = tot.impr   > 0 ? (tot.clicks / tot.impr   * 100).toFixed(1) : '—';
    const totCr  = tot.clicks > 0 ? (tot.lpv    / tot.clicks * 100).toFixed(1) : '—';

    tfoot.innerHTML = `
        <tr>
          <td>Total</td>
          <td>${fmtBRL(tot.spend)}</td>
          <td>${fmtN(tot.clicks)}</td>
          <td>${totCtr !== '—' ? totCtr + '%' : '—'}</td>
          <td>${fmtN(tot.lpv)}</td>
          <td>${totCr !== '—' ? totCr + '%' : '—'}</td>
          <td>${fmtN(tot.conv)}</td>
        </tr>`;
}

// ── Render Chart ───────────────────────────────────────────────────────────
function renderChart(rows) {
    const sorted = [...rows].sort((a, b) => a.date.localeCompare(b.date));
    const labels = sorted.map(r => r.date.slice(5));  // MM-DD
    const spends = sorted.map(r => r.spend);
    const convs  = sorted.map(r => r.conversions);

    const ctx = document.getElementById('main-chart').getContext('2d');
    if (chart) { chart.destroy(); chart = null; }

    chart = new Chart(ctx, {
        data: {
            labels,
            datasets: [
                {
                    type:        'bar',
                    label:       'Gasto (R$)',
                    data:        spends,
                    backgroundColor: 'rgba(99,102,241,.5)',
                    borderColor:     '#6366f1',
                    borderWidth:     1,
                    yAxisID:     'y',
                },
                {
                    type:        'line',
                    label:       'Vendas',
                    data:        convs,
                    borderColor: '#22c55e',
                    backgroundColor: 'rgba(34,197,94,.15)',
                    borderWidth: 2,
                    pointRadius: 3,
                    tension:     .3,
                    yAxisID:     'y2',
                    fill:        true,
                },
            ]
        },
        options: {
            responsive: true,
            interaction: { mode: 'index', intersect: false },
            plugins: { legend: { labels: { color: '#94a3b8', font: { size: 12 } } } },
            scales: {
                x:  { ticks: { color: '#64748b', maxTicksLimit: 14 }, grid: { color: '#1e2333' } },
                y:  { position: 'left',  ticks: { color: '#64748b',
                        callback: v => 'R$ ' + v.toLocaleString('pt-BR') }, grid: { color: '#1e2333' } },
                y2: { position: 'right', ticks: { color: '#22c55e' }, grid: { drawOnChartArea: false } },
            }
        }
    });
}

// ── SSE loader ─────────────────────────────────────────────────────────────
function setStatus(msg, cls = '') {
    const bar = document.getElementById('status-bar');
    bar.className = 'status-bar' + (cls ? ' ' + cls : '');
    document.getElementById('status-msg').textContent = msg;
}

function show(id) { const el = document.getElementById(id); if (el) el.style.display = ''; }
function hide(id) { const el = document.getElementById(id); if (el) el.style.display = 'none'; }

async function load() {
    if (abortCtrl) { try { abortCtrl.abort(); } catch (_) {} }
    abortCtrl = new AbortController();
    const signal = abortCtrl.signal;

    hide('kpi-grid'); hide('chart-card'); hide('table-card'); hide('error-msg');
    setStatus('Carregando...');

    try {
        const url  = apiUrl('/meta-only', getDateQS());
        const resp = await fetch(url, { signal });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);

        const reader  = resp.body.getReader();
        const decoder = new TextDecoder();
        let   buffer  = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });

            const parts = buffer.split('\n\n');
            buffer = parts.pop();

            for (const part of parts) {
                const line = part.trim();
                if (!line || line.startsWith(':')) continue;
                if (!line.startsWith('data:')) continue;

                let d;
                try { d = JSON.parse(line.slice(5).trim()); } catch (_) { continue; }

                if (d.stage === 'status') {
                    setStatus(d.message);
                } else if (d.stage === 'kpis') {
                    renderKpis(d.totals);
                    show('kpi-grid');
                } else if (d.stage === 'daily') {
                    renderTable(d.rows);
                    renderChart(d.rows);
                    show('table-card');
                    show('chart-card');
                } else if (d.stage === 'done') {
                    setStatus('✓ Atualizado em ' + new Date().toLocaleTimeString('pt-BR'), 'done');
                } else if (d.stage === 'error') {
                    setStatus('Erro: ' + d.message, 'error');
                    document.getElementById('error-msg').textContent = d.message;
                    show('error-msg');
                }
            }
        }
    } catch (err) {
        if (err.name !== 'AbortError') {
            setStatus('Erro de conexão: ' + err.message, 'error');
        }
    }
}

// ── Boot ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    initDRP();
    load();
});
</script>
