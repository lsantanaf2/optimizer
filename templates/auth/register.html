{% extends "auth/base_auth.html" %}

{% block title %}Criar Conta — OPTIMIZER{% endblock %}

{% block auth_content %}
<div class="auth-logo">
    <div class="icon">⚡</div>
    <h1>OPTIMIZER</h1>
    <p>Crie sua conta</p>
</div>

{% if error %}
<div class="auth-error">{{ error }}</div>
{% endif %}

<form class="auth-form" method="POST" action="{{ url_for('auth.register_submit') }}">
    <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required
            value="{{ request.form.get('email', '') }}">
    </div>
    <div class="field">
        <label for="password">Senha</label>
        <div class="field-password">
            <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required minlength="6">
            <button type="button" class="toggle-password" onclick="togglePassword(this)">👁</button>
        </div>
    </div>
    <div class="field">
        <label for="password_confirm">Confirmar Senha</label>
        <div class="field-password">
            <input type="password" id="password_confirm" name="password_confirm" placeholder="Repita a senha" required>
            <button type="button" class="toggle-password" onclick="togglePassword(this)">👁</button>
        </div>
    </div>
    <button type="submit" class="auth-btn auth-btn-primary">Criar Conta</button>
</form>

<div class="auth-footer">
    Ja tem conta? <a href="{{ url_for('auth.login_page') }}">Fazer login</a>
</div>
{% endblock %}
