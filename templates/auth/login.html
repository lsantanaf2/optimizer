{% extends "auth/base_auth.html" %}

{% block title %}Login — OPTIMIZER{% endblock %}

{% block auth_content %}
<div class="auth-logo">
    <div class="icon">⚡</div>
    <h1>OPTIMIZER</h1>
    <p>Acesse sua conta</p>
</div>

{% if error %}
<div class="auth-error">{{ error }}</div>
{% endif %}

<form class="auth-form" method="POST" action="{{ url_for('auth.login_submit') }}">
    <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required
            value="{{ request.form.get('email', '') }}">
    </div>
    <div class="field">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="Sua senha" required>
    </div>
    <button type="submit" class="auth-btn auth-btn-primary">Entrar</button>
</form>

<div class="auth-footer">
    Ainda no tem conta? <a href="{{ url_for('auth.register_page') }}">Criar conta</a>
</div>
{% endblock %}
